<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Agri Price Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>🌾 Agri Price Prediction System</h1>

    <form id="predictForm">
        <label>Commodity</label>
        <input type="text" id="commodity" placeholder="e.g. Wheat" required>

        <label>Market ID</label>
        <input type="number" id="market_id" placeholder="e.g. 102" required>

        <label>Date</label>
        <input type="date" id="date" required>

        <label>Minimum Price (₹)</label>
        <input type="number" id="p_min" required>

        <label>Maximum Price (₹)</label>
        <input type="number" id="p_max" required>

        <button type="submit">🔮 Predict Price</button>
    </form>

    <div id="loading" class="hidden">⏳ Predicting...</div>
    <div id="result"></div>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
