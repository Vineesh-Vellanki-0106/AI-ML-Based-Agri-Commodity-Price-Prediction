<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Agri Price Prediction</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #97831d31, #f99393);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: #76303f20;
            width: 600px;
            padding: 30px 35px;
            border-radius: 10px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            color: #2c3e50;
        }

        .form-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        label {
            font-weight: 600;
            font-size: 14px;
            color: #555;
        }

        input {
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid #991d1d9c;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #1d976c49;
            box-shadow: 0 0 6px rgba(29, 151, 108, 0.4);
        }

        button {
            margin-top: 10px;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #1d3197, #2e53cc);
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(29, 151, 108, 0.4);
        }

        #result {
            margin-top: 20px;
            text-align: center;
            font-size: 18px;
            color: #621d97d4;
            font-weight: bold;
        }

        footer {
            margin-top: 15px;
            text-align: center;
            font-size: 18px;
            color: #887725ee;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>ML model for Agri Price Prediction</h1>

        <div class="form-container">

            <label>Commodity</label>
            <select id="commodity">
    <option value="Onion">Onion</option>
    <option value="Potato">Potato</option>
    <option value="Apple">Apple</option>
    <option value="Wheat">Wheat</option>
    <option value="Arhar">Arhar</option>
</select>

            <label>Date</label>
            <input type="date" id="date" required>

            <label>Minimum Price (₹)</label>
            <input type="number" id="p_min" placeholder="e.g., 1200">

            <label>Maximum Price (₹)</label>
            <input type="number" id="p_max" placeholder="e.g., 1500">

            <button onclick="predict()">Predict Price</button>

        </div>

        <h2 id="result"></h2>

        <footer>
            Agri Price Prediction System
        </footer>
    </div>

    <!-- External JavaScript -->
    <script src="static/script.js"></script>

</body>
</html>
